# Minimal tmux config for the dev container.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor passthrough for nvim
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 0                        # no delay for <Esc> (matters in nvim)

# Status bar — minimal Catppuccin Mocha palette; no GPU in containers.
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=#6C7086"
set -g status-left " #[fg=#CBA6F7]#{session_name}#[fg=#6C7086]  "
set -g status-left-length 30
set -g status-right-length 140
set -g window-status-style         "bg=default"
set -g window-status-current-style "bg=default"
set -g window-status-format         "#[fg=#6C7086] #{window_index}:#{window_name} "
set -g window-status-current-format "#[fg=#fab387] #{window_index}:#{window_name} "
set -g window-status-separator ""
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#B4BEFE"
set -g message-style "bg=#313244,fg=#CDD6F4"
# CPU / RAM / NET(↓RX ↑TX) / IP — no GPU (containers rarely expose one).
# Requires ~/.config/tmux/stats.sh (written by the nvim-lazy installer).
set -g status-right "#[fg=#fab387]CPU #[fg=#CDD6F4]#(~/.config/tmux/stats.sh cpu)  #[fg=#A6E3A1]RAM #[fg=#CDD6F4]#(~/.config/tmux/stats.sh ram)  #[fg=#74C7EC]NET #[fg=#CDD6F4]#(~/.config/tmux/stats.sh net)  #[fg=#94E2D5]#(~/.config/tmux/stats.sh ip)  #[fg=#6C7086]%H:%M  %d %b "
