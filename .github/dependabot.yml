version: 2
updates:
  # Bump versions of the actions used in our workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  # Bump the base image / pinned tags in the Dockerfile.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "docker"

# Note: Neovim plugins pinned in lazy-lock.json are NOT a Dependabot ecosystem.
# They are bumped by .github/workflows/update-plugins.yml (scheduled PR).
