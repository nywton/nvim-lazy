name: Update plugins

# Dependabot can't track lazy.nvim plugins, so this job bumps them itself:
# it runs `:Lazy update`, and if lazy-lock.json changed it opens a PR.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim (stable)
        run: |
          curl -fL https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz -o /tmp/nvim.tar.gz
          sudo tar -xzf /tmp/nvim.tar.gz -C /opt
          sudo mv /opt/nvim-linux-* /opt/neovim
          sudo ln -sf /opt/neovim/bin/nvim /usr/local/bin/nvim

      - name: Build deps for treesitter
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential git curl

      - name: Link checkout as the nvim config
        run: |
          mkdir -p ~/.config
          ln -s "$GITHUB_WORKSPACE" ~/.config/nvim

      - name: Update plugins
        run: |
          nvim --headless "+Lazy! update" +qa
          nvim --headless "+TSUpdateSync" +qa 2>/dev/null || true

      - name: Open PR if lazy-lock.json changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump nvim plugins (lazy-lock.json)"
          title: "chore: bump nvim plugins"
          body: |
            Automated weekly `:Lazy update`. CI runs the feature tests against
            the new plugin versions — merge if green.
          branch: chore/update-plugins
          add-paths: lazy-lock.json
          delete-branch: true
