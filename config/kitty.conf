# vim:fileencoding=utf-8:foldmethod=marker

# =============================================================================
# General
# =============================================================================

hide_window_decorations no
background_opacity      0.95
enable_audio_bell       no

# =============================================================================
# Font
# =============================================================================

font_size        16.0
font_family      JetBrainsMono Nerd Font Mono
bold_font        JetBrainsMono Nerd Font Mono Extra Bold
bold_italic_font JetBrainsMono Nerd Font Mono Extra Bold Italic

# =============================================================================
# Window
# =============================================================================

window_padding_width       0
single_window_margin_width 0
enabled_layouts            fat:bias=90;full_size=1;mirrored=false, stack

# =============================================================================
# Keymaps
# =============================================================================

map kitty_mod+r     no_op
map ctrl+p          no_op
map ctrl+shift+6    no_op
map kitty_mod+enter launch --cwd=current
map kitty_mod+t     new_tab_with_cwd
map ctrl+shift+up   resize_window taller 1
map ctrl+shift+down resize_window shorter 1

# =============================================================================
# Tab bar
# =============================================================================

tab_bar_min_tabs    2
tab_bar_edge        top
tab_bar_style       fade
tab_fade            0
tab_bar_background  none

tab_bar_margin_width  10
tab_bar_margin_height 15 10

tab_title_template        "{fmt.fg._6c7086}{fmt.fg.default} {title} {fmt.fg._6c7086}"
active_tab_title_template "{fmt.fg._fab387}{fmt.fg.default} {title} {fmt.fg._fab387}"

active_tab_background   #1E1E2E
active_tab_foreground   #11111B
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# =============================================================================
# Catppuccin Mocha
# =============================================================================

foreground           #CDD6F4
background           #1E1E2E
selection_foreground #1E1E2E
selection_background #F5E0DC

cursor            #F5E0DC
cursor_text_color #1E1E2E

url_color #F5E0DC

active_border_color   #B4BEFE
inactive_border_color #6C7086
bell_border_color     #F9E2AF

wayland_titlebar_color #1E1E2E
macos_titlebar_color   #1E1E2E

mark1_foreground #1E1E2E
mark1_background #B4BEFE
mark2_foreground #1E1E2E
mark2_background #CBA6F7
mark3_foreground #1E1E2E
mark3_background #74C7EC

