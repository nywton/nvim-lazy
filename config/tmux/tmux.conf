# =============================================================================
# General
# =============================================================================

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g mouse on
set -g escape-time 0
set -g history-limit 10000
set -g focus-events on

# vi mode
set-window-option -g mode-keys vi
# Use v to begin selection like Vim's visual mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
# Use y to yank selection like Vim's yank
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel


# =============================================================================
# Keybinds
# =============================================================================

bind r source-file ~/.tmux.conf \; display "Config reloaded"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# =============================================================================
# Catppuccin Mocha — matching kitty config
# =============================================================================

# Palette
# base     #1E1E2E
# mantle   #11111B (tab_bar_background in kitty)
# surface0 #313244
# overlay0 #6C7086
# text     #CDD6F4
# peach    #fab387 (active tab color in kitty)
# lavender #B4BEFE
# mauve    #CBA6F7

# Pane borders
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#B4BEFE"

# Command / message line
set -g message-style "bg=#313244,fg=#CDD6F4"

# NB: the status bar (both lines) is appended as a guarded managed block by
# the installer — keep it there so re-runs can refresh it. See the
# "# >>> nvim-lazy tmux stats >>>" block at the bottom of this file.
