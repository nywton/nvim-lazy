# OSC 52 clipboard passthrough: lets nvim (and copy-mode y) reach the LOCAL
# machine's clipboard through SSH — required on headless servers where there
# is no X/Wayland clipboard tool. Your terminal must support OSC 52 (kitty,
# iTerm2, WezTerm, Ghostty, Windows Terminal all do).
set -s set-clipboard on

# Single status line at the bottom: session name (left), window list
# (center, native tmux), machine/user/navbar/clock (right). The navbar
# (CPU/RAM/DISK/NET, plus GPU/Docker when present) is extensible — see
# ~/.config/tmux/stats.sh; add a stat there and it shows up here, no
# tmux.conf edit needed.
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=#6C7086"

set -g status-left " #[fg=#CBA6F7,bg=default]#{session_name}#[fg=#6C7086]  "
set -g status-left-length 30
set -g status-right-length 160
set -g status-right "#[fg=#F9E2AF]#(whoami)@ #{s|#{HOME}|~|:pane_current_path} #[fg=#6C7086]│ #(~/.config/tmux/stats.sh navbar) #[fg=#6C7086]│ #(~/.config/tmux/stats.sh ip)  #[fg=#6C7086]%H:%M  %d %b "

set -g window-status-style         "bg=default"
set -g window-status-current-style "bg=default"
set -g window-status-format         "#[fg=#6C7086,bg=default] #{window_index}:#{window_name} "
set -g window-status-current-format "#[fg=#fab387,bg=default] #{window_index}:#{window_name} "
set -g window-status-separator ""

# Explicitly (re)builds tmux's own single-line template from the options
# above — needed because an earlier iteration of this config on this machine
# set status-format[] directly, and `set -gu` on an array element empties
# it rather than reverting to tmux's compiled-in default (verified: unsetting
# status-format[0] left the status line completely blank). Setting it
# explicitly is the only way to guarantee this file's session/window/navbar
# content actually renders, regardless of what an older run of this file
# left active on the running server.
set -g "status-format[1]" ""
set -g "status-format[0]" "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?window_end_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?window_end_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"
