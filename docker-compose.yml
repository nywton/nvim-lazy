# Convenience wrapper around the Dockerfile.
#
#   docker compose build           # build the image
#   docker compose run --rm dev     # zsh shell (your CWD is mounted at /work)
#   docker compose run --rm dev nvim
#
# Named volumes keep your shell history and Neovim data (lazy plugins,
# treesitter parsers, undo) between runs so nothing re-installs.
services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: neo-nvim
    init: true
    stdin_open: true
    tty: true
    working_dir: /work
    volumes:
      - .:/work
      - nvim-data:/home/dev/.local/share/nvim
      - zsh-history:/home/dev/.zsh_history.d
    command: zsh

volumes:
  nvim-data:
  zsh-history:
